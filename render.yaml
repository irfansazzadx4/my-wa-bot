services:
  - type: web
    name: my-wa-bot
    runtime: node
    buildCommand: apt-get update && apt-get install -y chromium --no-install-recommends && npm install
    startCommand: node index.js
    envVars:
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PORT
        generateValue: false
      - key: ADMIN_PASS
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_BRANCH
        value: main
    disk:
      name: bot-data
      mountPath: /opt/render/project/src
      sizeGB: 1
